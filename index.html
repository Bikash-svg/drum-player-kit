<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drum Kit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <main>
        <div class="drumKit-area">
            <button btn-data="a" class="drum-btn" id="a">A</button>
            <button btn-data="s" class="drum-btn" id="s">S</button>
            <button btn-data="d" class="drum-btn" id="d">D</button>
            <button btn-data="f" class="drum-btn" id="f">F</button>
            <button btn-data="g" class="drum-btn" id="g">G</button>
            <button btn-data="h" class="drum-btn" id="h">H</button>
            <button btn-data="j" class="drum-btn" id="j">J</button>
            <button btn-data="k" class="drum-btn" id="k">K</button>
            <button btn-data="l" class="drum-btn" id="l">L</button>
        </div>
    </main>



    <audio data-key="a" src="sounds/boom.wav"></audio>
    <audio data-key="s" src="sounds/clap.wav"></audio>
    <audio data-key="d" src="sounds/hihat.wav"></audio>
    <audio data-key="f" src="sounds/kick.wav"></audio>
    <audio data-key="g" src="sounds/openhat.wav"></audio>
    <audio data-key="h" src="sounds/ride.wav"></audio>
    <audio data-key="j" src="sounds/snare.wav"></audio>
    <audio data-key="k" src="sounds/tom.wav"></audio>
    <audio data-key="l" src="sounds/tink.wav"></audio>

    <script src="script.js"></script>
</body>
</html>
